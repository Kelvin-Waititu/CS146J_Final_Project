<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyFlow | Tasks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <script src="../js/theme-toggle.js" defer></script>
    <script src="../js/bundle.js" defer></script>
  </head>
  <body data-page="tasks">
    <a class="skip-link" href="#main">Skip to main content</a>
    <header class="site-header">
      <nav class="nav-shell" aria-label="Primary navigation">
        <a class="brand" href="index.html" aria-label="StudyFlow dashboard">
          <span class="brand-mark" aria-hidden="true">SF</span>
          <span>StudyFlow</span>
        </a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav">
          <span class="sr-only">Toggle navigation</span>
          <span aria-hidden="true"></span>
        </button>
        <ul class="nav-links" id="primary-nav">
          <li><a href="index.html">Dashboard</a></li>
          <li><a aria-current="page" href="tasks.html">Tasks</a></li>
          <li><a href="planner.html">Planner</a></li>
          <li><a href="analytics.html">Analytics</a></li>
        </ul>
        <button class="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
          <span aria-hidden="true">☾</span>
        </button>
      </nav>
    </header>

    <main id="main" class="page-shell">
      <section class="page-intro" aria-labelledby="tasks-title">
        <p class="eyebrow">Command center</p>
        <h1 id="tasks-title">Deadlines. Ranked.</h1>
      </section>

      <section class="tool-layout">
        <aside class="panel" aria-labelledby="new-task-title">
          <div class="section-heading compact">
            <p class="eyebrow">Task builder</p>
            <h2 id="new-task-title">Add work</h2>
          </div>
          <div class="form-steps" aria-label="Task form progress">
            <span class="active" data-step-dot="1">1</span>
            <span data-step-dot="2">2</span>
          </div>
          <form class="stacked-form" id="taskForm">
            <fieldset class="form-step active" data-step="1">
              <legend>Basics</legend>
              <label>
                <span>Title</span>
                <input required name="title" type="text" placeholder="Problem set 8" />
              </label>
              <label>
                <span>Course</span>
                <input required name="course" type="text" placeholder="MATH 51" />
              </label>
              <label>
                <span>Type</span>
                <select name="type">
                  <option>Assignment</option>
                  <option>Exam</option>
                  <option>Reading</option>
                  <option>Project</option>
                </select>
              </label>
              <button class="button primary" type="button" data-next-step>Next</button>
            </fieldset>

            <fieldset class="form-step" data-step="2">
              <legend>Plan</legend>
              <label>
                <span>Due date</span>
                <input required name="dueDate" type="date" />
              </label>
              <label>
                <span>Estimated hours</span>
                <input required min="0.5" step="0.5" name="hours" type="number" value="2" />
              </label>
              <label>
                <span>Priority</span>
                <select name="priority">
                  <option>High</option>
                  <option>Medium</option>
                  <option>Low</option>
                </select>
              </label>
              <div class="form-preview" id="taskPreview" aria-live="polite"></div>
              <p class="form-error" id="taskFormError" aria-live="assertive"></p>
              <div class="form-actions">
                <button class="button secondary" type="button" data-prev-step>Back</button>
                <button class="button primary" type="submit">Save task</button>
              </div>
            </fieldset>
          </form>
        </aside>

        <section class="panel" aria-labelledby="all-tasks-title">
          <div class="section-heading with-actions">
            <div>
              <p class="eyebrow">Pipeline</p>
              <h2 id="all-tasks-title">Work queue</h2>
            </div>
            <div class="segmented-control" aria-label="Filter tasks">
              <button type="button" class="active" data-filter="all">All</button>
              <button type="button" data-filter="open">Open</button>
              <button type="button" data-filter="completed">Done</button>
            </div>
          </div>
          <div class="task-table" id="taskTable" aria-live="polite"></div>
        </section>
      </section>
    </main>
    <section class="ai-assistant" aria-label="StudyFlow AI assistant">
      <button class="ai-fab" type="button" aria-expanded="false" aria-controls="aiPanel">
        <span aria-hidden="true" class="message-icon"></span>
        <span class="sr-only">Open assistant</span>
      </button>
      <div class="ai-panel" id="aiPanel" aria-live="polite">
        <header>
          <div>
            <p class="eyebrow">Assistant</p>
            <h2>Study copilot</h2>
          </div>
          <button class="small-action ai-close" type="button">Close</button>
        </header>
        <div class="ai-messages" id="aiMessages"></div>
        <div class="ai-prompts" aria-label="Suggested assistant prompts">
          <button type="button" data-ai-prompt="next">What should I do next?</button>
          <button type="button" data-ai-prompt="plan">Build a study plan</button>
          <button type="button" data-ai-prompt="risk">Show my risks</button>
        </div>
        <form class="ai-chat-form" data-ai-chat-form>
          <label class="sr-only" for="aiChatInputTasks">Ask the assistant</label>
          <input id="aiChatInputTasks" name="message" type="text" placeholder="Ask about your workload..." autocomplete="off" />
          <button type="submit">Send</button>
        </form>
      </div>
    </section>
  </body>
</html>
